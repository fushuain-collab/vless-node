name: Deploy Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          npm install -g wrangler 2>&1 | tail -3
          wrangler deploy
          sleep 3
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://vless-proxy-011.fushuain.workers.dev --max-time 10)
          echo "Worker HTTP: $CODE"
