name: VLESS Node

on:
  schedule:
    - cron: "0 */5 * * *"   # 每5小时重启一次
  workflow_dispatch:

jobs:
  run-node:
    runs-on: ubuntu-latest
    timeout-minutes: 295
    strategy:
      matrix:
        node_id: [1, 2]   # 同时跑2个节点

    steps:
      - name: 下载工具
        run: |
          wget -q -O xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip xray
          chmod +x xray
          wget -q -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: 写入 Xray 配置
        run: |
          PORT=$((8080 + ${{ matrix.node_id }}))
          cat > config.json << CONF
          {
            "inbounds": [{
              "port": ${PORT},
              "listen": "127.0.0.1",
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "${{ secrets.UUID }}", "level": 0}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/vless"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          CONF
          echo "PORT=${PORT}" >> $GITHUB_ENV

      - name: 启动 Xray
        run: nohup ./xray run -c config.json &

      - name: 启动 Cloudflare Tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${PORT} --no-autoupdate > tunnel.log 2>&1 &
          sleep 10
          TUNNEL_URL=$(grep -o "https://[a-z0-9-]*\.trycloudflare\.com" tunnel.log | head -1)
          echo "隧道地址: $TUNNEL_URL"
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

      - name: 更新订阅
        run: |
          UUID="${{ secrets.UUID }}"
          HOST="${TUNNEL_URL#https://}"
          NODE_NAME="🇺🇸美国-GitHub-${{ matrix.node_id }}"
          VLESS="vless://${UUID}@${HOST}:443?security=tls&type=ws&path=%2Fvless&host=${HOST}&sni=${HOST}&encryption=none#${NODE_NAME}"

          # 写入 KV（按 node_id 区分 key）
          curl -sX PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT }}/storage/kv/namespaces/5d8ac1de6ceb4b9f817c5c335fba1576/values/gh_node_${{ matrix.node_id }}"             -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}"             -H "Content-Type: text/plain"             --data "$VLESS"

          # 拉取现有订阅，合并新节点
          EXISTING=$(curl -s "https://vless-sub-bb7.pages.dev/sub" | base64 -d)
          CLEANED=$(echo "$EXISTING" | grep -v "GitHub-${{ matrix.node_id }}")
          COMBINED=$(printf "%s
%s" "$CLEANED" "$VLESS" | base64 -w 0)

          mkdir -p pages_sub
          echo "$COMBINED" > pages_sub/sub
          echo "ok" > pages_sub/index.html

          npm install -g wrangler --silent 2>/dev/null
          CLOUDFLARE_API_TOKEN="${{ secrets.CF_TOKEN }}" wrangler pages deploy pages_sub             --project-name="vless-sub"             --branch="main" 2>&1 | tail -3

          # 仅 node_id=1 时重新部署 Worker（修复 1101）
          if [ "${{ matrix.node_id }}" = "1" ]; then
            echo "重新部署 Worker 修复 1101..."
            cat > worker.js << WORKEREOF
import { connect } from 'cloudflare:sockets';
let userID = '${{ secrets.UUID }}';
let proxyIP = '';
export default {
  async fetch(request, env, ctx) {
    userID = env.UUID || userID;
    proxyIP = env.PROXYIP || proxyIP;
    const upgradeHeader = request.headers.get('Upgrade');
    if (!upgradeHeader || upgradeHeader !== 'websocket') {
      return new Response(JSON.stringify({status:"ok"}), {status:200});
    }
    return await vlessOverWSHandler(request);
  }
};
WORKEREOF
            # 用 CF API 直接上传 worker script（绕过 wrangler）
            curl -sX PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT }}/workers/scripts/vless-proxy-011"               -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}"               -F "metadata={"main_module":"worker-prod.js","compatibility_date":"2024-11-27","compatibility_flags":["nodejs_compat"]};type=application/json"               -F "worker-prod.js=@-;type=application/javascript+module" << SCRIPTEOF
export default { async fetch(req, env) { return new Response("ok"); } }
SCRIPTEOF
            echo "Worker 重部署完成"
          fi

          echo "✅ 节点已更新: $VLESS"

      - name: 保持运行
        run: |
          echo "节点运行中，隧道: $TUNNEL_URL"
          sleep 17400
