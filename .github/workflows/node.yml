name: VLESS Node

on:
  schedule:
    - cron: "0 */5 * * *"   # 每5小时重启一次
  workflow_dispatch:

jobs:
  run-node:
    runs-on: ubuntu-latest
    timeout-minutes: 295
    strategy:
      matrix:
        node_id: [1, 2]   # 同时跑2个节点

    steps:
      - name: 下载工具
        run: |
          wget -q -O xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip xray
          chmod +x xray
          wget -q -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: 写入 Xray 配置
        run: |
          PORT=$((8080 + ${{ matrix.node_id }}))
          cat > config.json << CONF
          {
            "inbounds": [{
              "port": ${PORT},
              "listen": "127.0.0.1",
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "${{ secrets.UUID }}", "level": 0}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/vless"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          CONF
          echo "PORT=${PORT}" >> $GITHUB_ENV

      - name: 启动 Xray
        run: nohup ./xray run -c config.json &

      - name: 启动 Cloudflare Tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${PORT} --no-autoupdate > tunnel.log 2>&1 &
          sleep 10
          TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' tunnel.log | head -1)
          echo "隧道地址: $TUNNEL_URL"
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

      - name: 更新订阅
        run: |
          UUID="${{ secrets.UUID }}"
          HOST="${TUNNEL_URL#https://}"
          NODE_NAME="🇺🇸美国-GitHub-${{ matrix.node_id }}"
          VLESS="vless://${UUID}@${HOST}:443?security=tls&type=ws&path=%2Fvless&host=${HOST}&sni=${HOST}&encryption=none#${NODE_NAME}"

          # 写入 KV
          curl -sX PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT }}/storage/kv/namespaces/5d8ac1de6ceb4b9f817c5c335fba1576/values/gh_node_${{ matrix.node_id }}" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data "$VLESS"

          # 拉取现有订阅，合并新节点
          EXISTING=$(curl -s "https://vless-sub-bb7.pages.dev/sub" | base64 -d)
          CLEANED=$(echo "$EXISTING" | grep -v "GitHub-${{ matrix.node_id }}")
          CF_NODES="vless://e0240134-0986-4b92-a230-fdc8d1200456@103.21.244.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%AD%F0%9F%87%B0%E9%A6%99%E6%B8%AF-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@103.22.200.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%AF%F0%9F%87%B5%E6%97%A5%E6%9C%AC-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@103.31.4.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%B8%F0%9F%87%AC%E6%96%B0%E5%8A%A0%E5%9D%A1-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.16.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%A8%F0%9F%87%B3%E5%8F%B0%E6%B9%BE-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.17.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%B0%F0%9F%87%B7%E9%9F%A9%E5%9B%BD-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.18.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%A9%F0%9F%87%AA%E5%BE%B7%E5%9B%BD-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.19.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%AC%F0%9F%87%A7%E8%8B%B1%E5%9B%BD-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.20.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%AB%F0%9F%87%B7%E6%B3%95%E5%9B%BD-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.21.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%B3%F0%9F%87%B1%E8%8D%B7%E5%85%B0-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.22.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%A6%F0%9F%87%BA%E6%BE%B3%E5%A4%A7%E5%88%A9%E4%BA%9A-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.23.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%A7%F0%9F%87%B7%E5%B7%B4%E8%A5%BF-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@104.24.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%AE%F0%9F%87%B3%E5%8D%B0%E5%BA%A6-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@172.64.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%BA%F0%9F%87%B8%E7%BE%8E%E5%9B%BD%E8%A5%BF-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@172.65.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%A8%F0%9F%87%A6%E5%8A%A0%E6%8B%BF%E5%A4%A7-CF vless://e0240134-0986-4b92-a230-fdc8d1200456@172.66.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%AF%F0%9F%87%B5%E6%97%A5%E6%9C%AC-CF-2 vless://e0240134-0986-4b92-a230-fdc8d1200456@172.67.1.1:443?security=tls&type=ws&host=edgetunnel-proxy-hj9.pages.dev&sni=edgetunnel-proxy-hj9.pages.dev&path=%2F&encryption=none&fp=chrome#%F0%9F%87%B8%F0%9F%87%AC%E6%96%B0%E5%8A%A0%E5%9D%A1-CF-2"
          COMBINED=$(printf '%s\n%s\n%s' "$CLEANED" "$VLESS" "$CF_NODES" | base64 -w 0)

          mkdir -p pages_sub
          echo "$COMBINED" > pages_sub/sub
          echo "ok" > pages_sub/index.html

          npm install -g wrangler --silent 2>/dev/null
          CLOUDFLARE_API_TOKEN="${{ secrets.CF_TOKEN }}" wrangler pages deploy pages_sub \
            --project-name="vless-sub" \
            --branch="main" 2>&1 | tail -3

          # 仅 node_id=1 时重新部署 Worker（修复 1101）
          if [ "${{ matrix.node_id }}" = "1" ]; then
            echo "重新部署 Worker 修复 1101..."
            CLOUDFLARE_API_TOKEN="${{ secrets.CF_TOKEN }}" wrangler deploy worker-prod.js \
              --name vless-proxy-011 \
              --compatibility-date 2024-11-27 \
              --compatibility-flags nodejs_compat 2>&1 | tail -5 || echo "Worker deploy skipped (no worker-prod.js)"
          fi

          echo "✅ 节点已更新: $VLESS"

      - name: 保持运行
        run: |
          echo "节点运行中，隧道: $TUNNEL_URL"
          sleep 17400
