name: Deploy MOFASHI Bettbox Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cloudflare/mofashi-bettbox-cf-sub/**'
      - '.github/workflows/deploy-mofashi-bettbox-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cloudflare/mofashi-bettbox-cf-sub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy
