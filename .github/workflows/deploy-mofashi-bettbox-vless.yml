name: Deploy Isolated Mofashi Bettbox VLESS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cloudflare/mofashi-bettbox-vless/**'
      - '.github/workflows/deploy-mofashi-bettbox-vless.yml'

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cloudflare/mofashi-bettbox-vless
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Deploy isolated worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy
      - name: Verify HTTP endpoints
        run: |
          sleep 5
          curl -fsS --max-time 30 https://mofashi-bettbox-vless.fushuain.workers.dev/health
          curl -fsS --max-time 30 https://mofashi-bettbox-vless.fushuain.workers.dev/sub | head -80
