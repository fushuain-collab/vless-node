name: Emergency Delete Wrong NFS Route

on:
  workflow_dispatch:

jobs:
  delete-route:
    runs-on: ubuntu-latest
    steps:
      - name: Delete accidental nfs.kdns.fr worker route
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error, sys
          token=os.environ['CF_TOKEN']; acc=os.environ['CF_ACCOUNT_ID']
          api='https://api.cloudflare.com/client/v4'
          H={'Authorization':'Bearer '+token,'Content-Type':'application/json'}
          TARGET_PATTERN='nfs.kdns.fr/*'
          TARGET_SCRIPT='edgetunnel-proxy'
          def req(method,url,data=None):
              body=json.dumps(data).encode() if data is not None else None
              r=urllib.request.Request(url,data=body,method=method,headers=H)
              try:
                  with urllib.request.urlopen(r,timeout=60) as resp:
                      txt=resp.read().decode(); print('\n###',method,url,'->',resp.status); print(txt[:5000]); return resp.status,json.loads(txt) if txt else {}
              except urllib.error.HTTPError as e:
                  txt=e.read().decode(errors='ignore'); print('\n###',method,url,'->',e.code); print(txt[:5000])
                  try: return e.code,json.loads(txt)
                  except: return e.code,{}
          st,z=req('GET',f'{api}/zones?account.id={acc}&per_page=50')
          zones=z.get('result') or []
          zid=None
          for zone in zones:
              if zone.get('name') == 'nfs.kdns.fr':
                  zid=zone['id']; break
          if not zid:
              print('ZONE_NOT_FOUND')
              sys.exit(2)
          st,routes=req('GET',f'{api}/zones/{zid}/workers/routes')
          found=[]
          for rt in routes.get('result') or []:
              print('ROUTE',rt.get('id'),rt.get('pattern'),rt.get('script'))
              if rt.get('pattern')==TARGET_PATTERN and rt.get('script')==TARGET_SCRIPT:
                  found.append(rt['id'])
          if not found:
              print('NO_ACCIDENTAL_ROUTE_FOUND_ALREADY_CLEAN')
          for rid in found:
              req('DELETE',f'{api}/zones/{zid}/workers/routes/{rid}')
              print('DELETED_ROUTE',rid)
          req('GET',f'{api}/zones/{zid}/workers/routes')
          PY
