name: Update Sub

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 部署订阅
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          npm install -g wrangler --silent 2>/dev/null
          mkdir -p pages_sub
          cat > pages_sub/sub << 'SUBEOF'

SUBEOF
          echo ok > pages_sub/index.html
          wrangler pages deploy pages_sub --project-name=vless-sub --branch=main 2>&1 | tail -3
          echo "总节点: 43"
