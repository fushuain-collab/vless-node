name: VLESS Asia Nodes

on:
  schedule:
    - cron: "30 */5 * * *"
  workflow_dispatch:

jobs:
  hkg:
    runs-on: ubuntu-latest
    timeout-minutes: 295
    steps:
      - name: 部署香港节点
        run: |
          UUID="${{ secrets.UUID }}"
          CF_TOKEN="${{ secrets.CF_TOKEN }}"
          CF_ACCOUNT="${{ secrets.CF_ACCOUNT }}"
          PORT=8083
          NODE_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote('🇭🇰香港-GitHub-3'))")

          # 下载 xray
          wget -q -O xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip xray && chmod +x xray

          # 下载 bore
          wget -q -O bore.tar.gz https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            || wget -q -O bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore

          # 写 xray 配置（vmess websocket）
          cat > config.json << CONF
          {"log":{"loglevel":"warning"},"inbounds":[{"port":${PORT},"listen":"127.0.0.1","protocol":"vless","settings":{"clients":[{"id":"${UUID}","level":0}],"decryption":"none"},"streamSettings":{"network":"ws","wsSettings":{"path":"/vless"}}}],"outbounds":[{"protocol":"freedom"}]}
          CONF

          ./xray run -c config.json &
          sleep 3

          # bore 穿透，把本地 PORT 暴露到 bore.pub
          nohup ./bore local ${PORT} --to bore.pub > bore.log 2>&1 &
          sleep 8

          # 从 bore 日志拿到分配的端口
          BORE_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' bore.log | head -1)
          echo "Bore port: $BORE_PORT"

          if [ -z "$BORE_PORT" ]; then
            echo "bore 连接失败，日志:"
            cat bore.log
            exit 1
          fi

          HOST="bore.pub"
          # bore 是 TCP，用 vmess+ws 不行，改用直接连接
          # vless 走 bore TCP 直连（非 TLS，用 none）
          VLESS="vless://${UUID}@bore.pub:${BORE_PORT}?security=none&type=ws&path=%2Fvless&encryption=none#${NODE_NAME}"

          echo "节点: $VLESS"

          # 写入 CF KV
          curl -sX PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/storage/kv/namespaces/5d8ac1de6ceb4b9f817c5c335fba1576/values/gh_node_3" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: text/plain" --data "$VLESS"

          # 更新订阅
          EXISTING=$(curl -s "https://vless-sub-bb7.pages.dev/sub" | base64 -d 2>/dev/null)
          CLEANED=$(echo "$EXISTING" | grep -v "GitHub-3")
          COMBINED=$(printf '%s\n%s' "$CLEANED" "$VLESS" | grep -v '^$' | base64 -w 0)
          mkdir -p pages_sub
          echo "$COMBINED" > pages_sub/sub && echo "ok" > pages_sub/index.html
          npm install -g wrangler --silent 2>/dev/null
          CLOUDFLARE_API_TOKEN="${CF_TOKEN}" wrangler pages deploy pages_sub \
            --project-name="vless-sub" --branch="main" 2>&1 | tail -3
          echo "✅ 香港节点已上线"

          sleep 17400

