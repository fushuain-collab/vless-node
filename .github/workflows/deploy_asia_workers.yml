name: Deploy Asia Workers

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 部署亚洲区 Workers
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          UUID: ${{ secrets.UUID }}
        run: |
          # 安装 wrangler
          npm install -g wrangler

          # 下载 worker 代码
          curl -sL "https://raw.githubusercontent.com/cmliu/edgetunnel/main/worker.js" -o worker.js

          declare -A REGIONS
          REGIONS[hk]="hk.xn--mesv7f5toqlp.tk"
          REGIONS[jp]="jp.xn--mesv7f5toqlp.tk"
          REGIONS[sg]="sg.xn--mesv7f5toqlp.tk"
          REGIONS[tw]="tw.xn--mesv7f5toqlp.tk"
          REGIONS[kr]="cdn-all.xn--b6gac.eu.org"

          declare -A NAMES
          NAMES[hk]="🇭🇰香港-CF"
          NAMES[jp]="🇯🇵日本-CF"
          NAMES[sg]="🇸🇬新加坡-CF"
          NAMES[tw]="🇨🇳台湾-CF"
          NAMES[kr]="🇰🇷韩国-CF"

          VLESS_LINES=""

          for CODE in hk jp sg tw kr; do
            PROXY=${REGIONS[$CODE]}
            NAME=${NAMES[$CODE]}
            WORKER="vless-proxy-$CODE"

            cat > wrangler-$CODE.toml << EOF
          name = "$WORKER"
          main = "worker.js"
          compatibility_date = "2024-11-27"

          [vars]
          UUID = "$UUID"
          PROXYIP = "$PROXY"
          EOF

            echo "=== 部署 $NAME ==="
            CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler deploy --config wrangler-$CODE.toml 2>&1 | tail -3

            # 生成节点链接（用优选IP作为入口）
            HOST="$WORKER.fushuain.workers.dev"
            NODE_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$NAME'))")
            VLESS="vless://${UUID}@cdn.tianzhuge.com:443?security=tls&type=ws&host=${HOST}&sni=${HOST}&path=%2Fvless&encryption=none#${NODE_NAME}"
            VLESS_LINES="$VLESS_LINES\n$VLESS"
            echo "✅ $NAME: $HOST"
          done

          echo ""
          echo "=== 更新订阅 ==="

          # 拉取现有订阅
          EXISTING=$(curl -s "https://vless-sub-bb7.pages.dev/sub" | base64 -d 2>/dev/null)

          # 去掉旧的亚洲CF节点
          CLEANED=$(echo "$EXISTING" | grep -v "vless-proxy-hk\|vless-proxy-jp\|vless-proxy-sg\|vless-proxy-tw\|vless-proxy-kr")

          # 合并新节点
          MERGED="$CLEANED$(echo -e "$VLESS_LINES")"
          NEW_B64=$(echo "$MERGED" | base64 -w0)

          # 上传到 CF Pages KV
          curl -sX PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/storage/kv/namespaces/5d8ac1de6ceb4b9f817c5c335fba1576/values/sub_content" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: text/plain" \
            --data "$NEW_B64" | python3 -c "import sys,json; r=json.load(sys.stdin); print('KV:', '✅' if r.get('success') else '❌', r.get('errors',''))"

          # 重新部署 Pages 订阅
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fushuain-collab/vless-node.git /tmp/repo
          mkdir -p /tmp/repo/pages_sub
          echo "$NEW_B64" > /tmp/repo/pages_sub/sub
          cd /tmp/repo
          git config user.email "bot@github.com"
          git config user.name "bot"
          git add pages_sub/sub
          git commit -m "add asia cf workers" --allow-empty
          git push

          echo "✅ 完成"
