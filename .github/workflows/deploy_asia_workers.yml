name: Deploy Asia Workers

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 部署5个亚洲Worker并写入订阅
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          UUID: ${{ secrets.UUID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g wrangler

          REGIONS="hk jp sg tw kr"
          declare -A NAMES=(["hk"]="🇭🇰香港-CF" ["jp"]="🇯🇵日本-CF" ["sg"]="🇸🇬新加坡-CF" ["tw"]="🇨🇳台湾-CF" ["kr"]="🇰🇷韩国-CF")
          
          VLESS_LINES=""

          for r in $REGIONS; do
            WORKER="vless-proxy-${r}"
            NAME="${NAMES[$r]}"
            JS_FILE="workers/worker-${r}.js"

            cat > wrangler-${r}.toml << EOF
name = "${WORKER}"
main = "${JS_FILE}"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]
EOF

            echo "=== 部署 ${NAME} ==="
            CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler deploy --config wrangler-${r}.toml 2>&1 | tail -3

            HOST="${WORKER}.${CF_ACCOUNT:0:8}.workers.dev"
            # workers.dev 实际格式用账号 subdomain
            SUBDOMAIN=$(CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler whoami 2>/dev/null | grep -o '[a-z0-9-]*\.workers\.dev' | head -1 | sed 's/\.workers\.dev//')
            HOST="${WORKER}.workers.dev"
            
            ENCODED_NAME=$(python3 -c "from urllib.parse import quote; print(quote('${NAME}'))")
            VLESS="vless://${UUID}@${HOST}:443?security=tls&type=ws&path=%2Fvless&host=${HOST}&sni=${HOST}&encryption=none#${ENCODED_NAME}"
            VLESS_LINES="${VLESS_LINES}${VLESS}\n"
            echo "  节点: ${NAME} → ${HOST}"
          done

          # 拉取现有订阅，合并写入
          SUB_URL="https://vless-sub-bb7.pages.dev/sub"
          EXISTING=$(curl -s "$SUB_URL" | base64 -d 2>/dev/null || echo "")
          
          # 去掉旧的同名节点
          CLEANED=$(echo "$EXISTING" | grep -v "vless-proxy-hk\|vless-proxy-jp\|vless-proxy-sg\|vless-proxy-tw\|vless-proxy-kr\|香港-CF\|日本-CF\|新加坡-CF\|台湾-CF\|韩国-CF")
          
          NEW_CONTENT="${CLEANED}"$'\n'"$(printf "$VLESS_LINES")"
          NEW_B64=$(echo "$NEW_CONTENT" | base64 -w0)

          # 通过 API 写入 pages_sub/sub
          SHA=$(curl -s "https://api.github.com/repos/fushuain-collab/vless-node/contents/pages_sub/sub" \
            -H "Authorization: token $GH_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")
          
          curl -s -X PUT "https://api.github.com/repos/fushuain-collab/vless-node/contents/pages_sub/sub" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"update sub with asia workers\",\"content\":\"$NEW_B64\",\"sha\":\"$SHA\"}" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print('订阅写入:', '✅' if 'content' in r else '❌ '+str(r.get('message','')))"
