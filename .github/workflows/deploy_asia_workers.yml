name: Deploy Asia Workers

on:
  workflow_dispatch:
  push:
    paths: ['workers/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 部署亚洲Workers并更新订阅
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          UUID: ${{ secrets.UUID }}
        run: |
          python3 - << 'EOF'
          import subprocess, json, base64, os
          from urllib.parse import quote

          CF_TOKEN = os.environ["CF_TOKEN"]
          CF_ACCOUNT = os.environ["CF_ACCOUNT"]
          UUID = os.environ["UUID"]

          regions = [
            ("vless-proxy-hk", "workers/worker-hk.js", "🇭🇰香港-CF"),
            ("vless-proxy-jp", "workers/worker-jp.js", "🇯🇵日本-CF"),
            ("vless-proxy-sg", "workers/worker-sg.js", "🇸🇬新加坡-CF"),
            ("vless-proxy-tw", "workers/worker-tw.js", "🇨🇳台湾-CF"),
            ("vless-proxy-kr", "workers/worker-kr.js", "🇰🇷韩国-CF"),
          ]

          # 获取 workers.dev subdomain
          r = subprocess.run([
            "curl", "-s",
            f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT}/workers/subdomain",
            "-H", f"Authorization: Bearer {CF_TOKEN}"
          ], capture_output=True, text=True)
          subdomain = json.loads(r.stdout).get("result", {}).get("subdomain", "")
          print(f"subdomain: {subdomain}")

          new_nodes = []
          for worker, jsfile, name in regions:
            # modules 格式上传（支持 import 语句）
            metadata = '{"main_module":"worker.js"}'
            r = subprocess.run([
              "curl", "-s", "-X", "PUT",
              f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT}/workers/scripts/{worker}",
              "-H", f"Authorization: Bearer {CF_TOKEN}",
              "-H", "Content-Type: multipart/form-data",
              "-F", f"metadata={metadata};type=application/json",
              "-F", f"worker.js=@{jsfile};filename=worker.js;type=application/javascript+module"
            ], capture_output=True, text=True)
            result = json.loads(r.stdout)
            if result.get("success"):
              # 开启 workers.dev 路由
              subprocess.run([
                "curl", "-s", "-X", "POST",
                f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT}/workers/scripts/{worker}/subdomain",
                "-H", f"Authorization: Bearer {CF_TOKEN}",
                "-H", "Content-Type: application/json",
                "-d", '{"enabled":true}'
              ], capture_output=True)
              host = f"{worker}.{subdomain}.workers.dev"
              tag = quote(name)
              vless = f"vless://{UUID}@{host}:443?security=tls&type=ws&host={host}&sni={host}&path=%2Fvless&encryption=none#{tag}"
              new_nodes.append(vless)
              print(f"✅ {name}: {host}")
            else:
              print(f"❌ {name}: {result.get('errors')}")

          if not new_nodes:
            print("所有节点部署失败")
            exit(1)

          # 合并订阅
          r = subprocess.run(["curl", "-s", "https://vless-sub-bb7.pages.dev/sub"], capture_output=True, text=True)
          try:
            existing = base64.b64decode(r.stdout.strip()).decode("utf-8", errors="ignore")
            lines = [l for l in existing.strip().split("\n") if l and not any(
              w in l for w in ["vless-proxy-hk","vless-proxy-jp","vless-proxy-sg","vless-proxy-tw","vless-proxy-kr"]
            )]
          except:
            lines = []
          all_nodes = lines + new_nodes
          new_b64 = base64.b64encode("\n".join(all_nodes).encode()).decode()

          os.makedirs("pages_sub", exist_ok=True)
          with open("pages_sub/sub", "w") as f:
            f.write(new_b64)
          print(f"总节点数: {len(all_nodes)}")
          EOF

      - name: 部署订阅到CF Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: npx wrangler pages deploy pages_sub --project-name=vless-sub --branch=main 2>&1 | tail -3
