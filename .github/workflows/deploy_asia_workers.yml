name: Deploy Asia Workers

on:
  workflow_dispatch:
  push:
    paths: ['workers/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装wrangler
        run: npm install -g wrangler

      - name: 部署所有Workers节点
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          UUID: ${{ secrets.UUID }}
        run: |
          # 各地区 PROXYIP（使用公开的各地区IP，CF会就近出口）
          declare -A PROXY
          PROXY[hk]="hk.xn--mesv7f5toqlp.tk"
          PROXY[jp]="jp.xn--mesv7f5toqlp.tk"
          PROXY[sg]="sg.xn--mesv7f5toqlp.tk"
          PROXY[tw]="tw.xn--mesv7f5toqlp.tk"
          PROXY[kr]="kr.xn--mesv7f5toqlp.tk"
          PROXY[de]="de.xn--mesv7f5toqlp.tk"
          PROXY[uk]="uk.xn--mesv7f5toqlp.tk"
          PROXY[fr]="fr.xn--mesv7f5toqlp.tk"
          PROXY[nl]="nl.xn--mesv7f5toqlp.tk"
          PROXY[au]="au.xn--mesv7f5toqlp.tk"
          PROXY[br]="br.xn--mesv7f5toqlp.tk"
          PROXY[in]="in.xn--mesv7f5toqlp.tk"
          PROXY[us]="us.xn--mesv7f5toqlp.tk"
          PROXY[ca]="ca.xn--mesv7f5toqlp.tk"

          for code in hk jp sg tw kr de uk fr nl au br in us ca; do
            name="vless-cf-${code}"
            echo "部署 $name ..."
            # 生成带有 UUID/PROXYIP 注入的 worker
            cat worker.js \
              | sed "s/let userID = .*/let userID = '${{ secrets.UUID }}';/" \
              | sed "s/let proxyIP = .*/let proxyIP = '${PROXY[$code]}';/" \
              > /tmp/worker-${code}.js

            # 用 wrangler deploy 部署为 Worker（不是 Pages）
            wrangler deploy /tmp/worker-${code}.js \
              --name ${name} \
              --compatibility-date 2024-11-27 \
              --compatibility-flags nodejs_compat 2>&1 | tail -3
            echo "✅ ${name}.fushuain.workers.dev"
          done

      - name: 更新订阅
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          UUID: ${{ secrets.UUID }}
        run: |
          python3 << 'EOF'
          import base64, os, urllib.request
          from urllib.parse import quote

          UUID = os.environ["UUID"]
          regions = [
            ("hk","🇭🇰香港-CF"),("jp","🇯🇵日本-CF"),("sg","🇸🇬新加坡-CF"),
            ("tw","🇨🇳台湾-CF"),("kr","🇰🇷韩国-CF"),("de","🇩🇪德国-CF"),
            ("uk","🇬🇧英国-CF"),("fr","🇫🇷法国-CF"),("nl","🇳🇱荷兰-CF"),
            ("au","🇦🇺澳大利亚-CF"),("br","🇧🇷巴西-CF"),("in","🇮🇳印度-CF"),
            ("us","🇺🇸美国西-CF"),("ca","🇨🇦加拿大-CF"),
          ]

          new_nodes = []
          for code, name in regions:
            host = f"vless-cf-{code}.fushuain.workers.dev"
            vless = f"vless://{UUID}@{host}:443?security=tls&type=ws&host={host}&sni={host}&path=%2Fvless&encryption=none#{quote(name)}"
            new_nodes.append(vless)
            print(f"✅ {name}: {host}")

          old_nodes = []
          try:
            req = urllib.request.Request(
              "https://vless-sub-bb7.pages.dev/sub",
              headers={"User-Agent": "clash/1.18.0"}
            )
            raw = urllib.request.urlopen(req, timeout=10).read()
            decoded = base64.b64decode(raw).decode("utf-8", errors="ignore")
            old_nodes = [l for l in decoded.split("\n") if l.startswith("vless://")
                         and "vless-cf-" not in l
                         and "vless-proxy-" not in l]
            print(f"读取到旧节点: {len(old_nodes)}")
          except Exception as e:
            print(f"读取旧订阅失败(忽略): {e}")

          all_nodes = old_nodes + new_nodes
          new_b64 = base64.b64encode("\n".join(all_nodes).encode()).decode()

          import os as _os
          _os.makedirs("pages_sub", exist_ok=True)
          with open("pages_sub/sub", "w") as f:
            f.write(new_b64)
          print(f"总节点数: {len(all_nodes)}")
          EOF
          wrangler pages deploy pages_sub --project-name=vless-sub --branch=main 2>&1 | tail -2
