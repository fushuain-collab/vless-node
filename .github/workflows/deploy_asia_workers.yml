name: Deploy Asia Workers

on:
  workflow_dispatch:
  push:
    paths: ['workers/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装wrangler
        run: npm install -g wrangler

      - name: 部署香港
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-hk.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-hk --branch=main 2>&1 | tail -2

      - name: 部署日本
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-jp.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-jp --branch=main 2>&1 | tail -2

      - name: 部署新加坡
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-sg.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-sg --branch=main 2>&1 | tail -2

      - name: 部署台湾
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-tw.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-tw --branch=main 2>&1 | tail -2

      - name: 部署韩国
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-kr.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-kr --branch=main 2>&1 | tail -2

      - name: 部署德国
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-de.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-de --branch=main 2>&1 | tail -2

      - name: 部署英国
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-uk.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-uk --branch=main 2>&1 | tail -2

      - name: 部署法国
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-fr.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-fr --branch=main 2>&1 | tail -2

      - name: 部署荷兰
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-nl.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-nl --branch=main 2>&1 | tail -2

      - name: 部署澳大利亚
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-au.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-au --branch=main 2>&1 | tail -2

      - name: 部署巴西
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-br.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-br --branch=main 2>&1 | tail -2

      - name: 部署印度
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-in.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-in --branch=main 2>&1 | tail -2

      - name: 部署美国
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-us.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-us --branch=main 2>&1 | tail -2

      - name: 部署加拿大
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          mkdir -p /tmp/p && cp workers/worker-ca.js /tmp/p/_worker.js
          wrangler pages deploy /tmp/p --project-name=vless-cf-ca --branch=main 2>&1 | tail -2

      - name: 更新订阅
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          UUID: ${{ secrets.UUID }}
        run: |
          python3 << 'EOF'
          import base64, os, urllib.request

          UUID = os.environ["UUID"]
          regions = [
            ("hk","🇭🇰香港-CF"),("jp","🇯🇵日本-CF"),("sg","🇸🇬新加坡-CF"),
            ("tw","🇨🇳台湾-CF"),("kr","🇰🇷韩国-CF"),("de","🇩🇪德国-CF"),
            ("uk","🇬🇧英国-CF"),("fr","🇫🇷法国-CF"),("nl","🇳🇱荷兰-CF"),
            ("au","🇦🇺澳大利亚-CF"),("br","🇧🇷巴西-CF"),("in","🇮🇳印度-CF"),
            ("us","🇺🇸美国西-CF"),("ca","🇨🇦加拿大-CF"),
          ]

          from urllib.parse import quote
          new_nodes = []
          for code, name in regions:
            host = f"vless-cf-{code}.pages.dev"
            vless = f"vless://{UUID}@{host}:443?security=tls&type=ws&host={host}&sni={host}&path=%2Fvless&encryption=none#{quote(name)}"
            new_nodes.append(vless)
            print(f"✅ {name}: {host}")

          # 读取现有订阅（失败时只用新节点）
          old_nodes = []
          try:
            req = urllib.request.Request(
              "https://vless-sub-bb7.pages.dev/sub",
              headers={"User-Agent": "clash/1.18.0"}
            )
            raw = urllib.request.urlopen(req, timeout=10).read()
            decoded = base64.b64decode(raw).decode("utf-8", errors="ignore")
            old_nodes = [l for l in decoded.split("\n") if l.startswith("vless://") and "vless-cf-" not in l]
            print(f"读取到旧节点: {len(old_nodes)}")
          except Exception as e:
            print(f"读取旧订阅失败(忽略): {e}")

          all_nodes = old_nodes + new_nodes
          new_b64 = base64.b64encode("\n".join(all_nodes).encode()).decode()

          import os as _os
          _os.makedirs("pages_sub", exist_ok=True)
          with open("pages_sub/sub", "w") as f:
            f.write(new_b64)
          print(f"总节点数: {len(all_nodes)}")
          EOF
          wrangler pages deploy pages_sub --project-name=vless-sub --branch=main 2>&1 | tail -2
