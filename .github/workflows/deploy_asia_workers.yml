name: Deploy Asia Workers

on:
  workflow_dispatch:
  push:
    paths: ['workers/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 部署亚洲区 Pages 并更新订阅
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          UUID: ${{ secrets.UUID }}
        run: |
          npm install -g wrangler

          REGIONS="hk:hk.xn--mesv7f5toqlp.tk:🇭🇰香港-CF jp:jp.xn--mesv7f5toqlp.tk:🇯🇵日本-CF sg:sg.xn--mesv7f5toqlp.tk:🇸🇬新加坡-CF tw:tw.xn--mesv7f5toqlp.tk:🇨🇳台湾-CF kr:cdn-all.xn--b6gac.eu.org:🇰🇷韩国-CF de:de.xn--mesv7f5toqlp.tk:🇩🇪德国-CF uk:uk.xn--mesv7f5toqlp.tk:🇬🇧英国-CF fr:fr.xn--mesv7f5toqlp.tk:🇫🇷法国-CF nl:nl.xn--mesv7f5toqlp.tk:🇳🇱荷兰-CF au:au.xn--mesv7f5toqlp.tk:🇦🇺澳大利亚-CF br:br.xn--mesv7f5toqlp.tk:🇧🇷巴西-CF in:in.xn--mesv7f5toqlp.tk:🇮🇳印度-CF us:bestproxy.onecf.eu.org:🇺🇸美国西海岸-CF ca:ts.hpc.tw:🇨🇦加拿大-CF"

          ALL_NODES=""
          for item in $REGIONS; do
            CODE=$(echo $item | cut -d: -f1)
            PROXY=$(echo $item | cut -d: -f2)
            NAME=$(echo $item | cut -d: -f3)
            PROJECT="vless-cf-${CODE}"
            DIR="/tmp/pages-${CODE}"

            mkdir -p "$DIR"
            # 把 UUID 和 proxyIP 硬编码进 js，环境变量方式
            sed "s/let userID = '[^']*'/let userID = '${UUID}'/; s/let proxyIP = '[^']*'/let proxyIP = '${PROXY}'/" workers/worker-${CODE}.js > "$DIR/_worker.js"

            RESULT=$(CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler pages deploy "$DIR" \
              --project-name="$PROJECT" \
              --branch=main 2>&1)

            if echo "$RESULT" | grep -q "Deployment complete"; then
              HOST="${PROJECT}.pages.dev"
              # 尝试从输出中提取实际域名
              ACTUAL=$(echo "$RESULT" | grep -oP 'https://[a-z0-9-]+\.pages\.dev' | tail -1 | sed 's|https://||')
              [ -n "$ACTUAL" ] && HOST="$ACTUAL"
              VLESS="vless://${UUID}@${HOST}:443?security=tls&type=ws&host=${HOST}&sni=${HOST}&path=%2Fvless&encryption=none#$(python3 -c "from urllib.parse import quote; print(quote('${NAME}'))")"
              ALL_NODES="${ALL_NODES}${VLESS}\n"
              echo "✅ ${NAME}: ${HOST}"
            else
              echo "❌ ${NAME}: $(echo "$RESULT" | tail -3)"
            fi
          done

          if [ -z "$ALL_NODES" ]; then
            echo "所有节点部署失败"; exit 1
          fi

          # 合并进现有订阅
          EXISTING=$(curl -s "https://vless-sub-bb7.pages.dev/sub" | base64 -d 2>/dev/null || echo "")
          # 去掉旧的 CF 节点（hk/jp/sg等），保留 CloudflareIP 和 GitHub 节点
          CLEANED=$(echo "$EXISTING" | grep -v "vless-cf-\|CF$" || echo "$EXISTING")
          NEW_NODES=$(printf "$ALL_NODES")
          ALL=$(printf "%s\n%s" "$CLEANED" "$NEW_NODES" | grep "^vless://" | sort -u)
          NEW_B64=$(echo "$ALL" | base64 -w0)

          echo "$NEW_B64" > pages_sub/sub
          CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler pages deploy pages_sub \
            --project-name=vless-sub \
            --branch=main 2>&1 | tail -3
          echo "总节点数: $(echo "$ALL" | grep -c "vless://")"
