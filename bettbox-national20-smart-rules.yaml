# Bettbox/Mihomo 智能分流规则版：国内直连，国外自动代理，广告拦截；旧订阅未覆盖
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
find-process-mode: strict
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  respect-rules: true
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - localhost.ptlogin2.qq.com
  - dns.msftncsi.com
  - www.msftncsi.com
  - time.*.com
  - time.*.gov
  - time.*.edu.cn
  - time1.cloud.tencent.com
  - '*.market.xiaomi.com'
  - '*.msftconnecttest.com'
  - '*.msftncsi.com'
