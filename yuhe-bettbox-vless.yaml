mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
proxies:
  - name: YUHE-01
    type: vless
    server: 172.64.148.42
    port: 2053
    uuid: 4f05f0b9-f75d-4cc3-8d2f-4f7ab7f65e0a
    network: ws
    tls: true
    udp: true
    servername: w.yuhe.kdns.fr
    client-fingerprint: chrome
    ws-opts:
      path: /vless
      headers:
        Host: w.yuhe.kdns.fr
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - YUHE-01
      - DIRECT
rules:
  - DOMAIN-SUFFIX,youtube.com,PROXY
  - DOMAIN-SUFFIX,google.com,PROXY
  - DOMAIN-SUFFIX,github.com,PROXY
  - DOMAIN-SUFFIX,telegram.org,PROXY
  - DOMAIN-SUFFIX,t.me,PROXY
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
