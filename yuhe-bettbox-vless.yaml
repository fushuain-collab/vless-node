# YUHE Bettbox / Mihomo - online hot rule-providers version
# Sources: blackmatrix7/ios_rule_script + Loyalsoldier/clash-rules
# Designed for Bettbox Android. Refresh subscription after update.

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
find-process-mode: strict
global-client-fingerprint: chrome
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - '+.google.com'
    - '+.youtube.com'
    - '+.openai.com'
    - '+.chatgpt.com'
    - '+.github.com'
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - '+.apple.com'
    - '+.wechat.com'
    - '+.qq.com'

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localdomain'
    - '*.example'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.home.arpa'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.time.windows.com'
    - '+.pool.ntp.org'
    - '+.ntp.org.cn'
    - '+.qq.com'
    - '+.tencent.com'
    - '+.wechat.com'
    - '+.weixin.qq.com'
    - '+.alipay.com'
    - '+.taobao.com'
    - '+.tmall.com'
    - '+.jd.com'
    - '+.mi.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    'geosite:cn':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

