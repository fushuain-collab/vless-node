# YUHE Bettbox / Mihomo - online rules 51kankan DIRECT test
mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
find-process-mode: strict
global-client-fingerprint: chrome
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    # QUIC sniff disabled for 51kankan diagnostic
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '+.qq.com'
    - '+.tencent.com'
    - '+.wechat.com'
    - '+.weixin.qq.com'
    - '+.jd.com'
    - '+.360buyimg.com'
    - '+.taobao.com'
    - '+.tmall.com'
    - '+.alicdn.com'
    - '+.mi.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.51kankan.org'
    - '+.m.51kankan.org'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
proxies:
  - name: YUHE-CF-172-2053
    type: vless
    server: 172.64.148.42
    port: 2053
    uuid: 4f05f0b9-f75d-4cc3-8d2f-4f7ab7f65e0a
    network: ws
    tls: true
    udp: true
    servername: w.yuhe.kdns.fr
    client-fingerprint: chrome
    ws-opts:
      path: /vless
      headers:
        Host: w.yuhe.kdns.fr
  - name: YUHE-CF-172-8443
    type: vless
    server: 172.64.148.42
    port: 8443
    uuid: 4f05f0b9-f75d-4cc3-8d2f-4f7ab7f65e0a
    network: ws
    tls: true
    udp: true
    servername: w.yuhe.kdns.fr
    client-fingerprint: chrome
    ws-opts:
      path: /vless
      headers:
        Host: w.yuhe.kdns.fr
  - name: YUHE-CF-172-2087
    type: vless
    server: 172.64.148.42
    port: 2087
    uuid: 4f05f0b9-f75d-4cc3-8d2f-4f7ab7f65e0a
    network: ws
    tls: true
    udp: true
    servername: w.yuhe.kdns.fr
    client-fingerprint: chrome
    ws-opts:
      path: /vless
      headers:
        Host: w.yuhe.kdns.fr
  - name: YUHE-CF-104-18-15-2053
    type: vless
    server: 104.18.15.19
    port: 2053
    uuid: 4f05f0b9-f75d-4cc3-8d2f-4f7ab7f65e0a
    network: ws
    tls: true
    udp: true
    servername: w.yuhe.kdns.fr
    client-fingerprint: chrome
    ws-opts:
      path: /vless
      headers:
        Host: w.yuhe.kdns.fr
proxy-groups:
  - name: PROXY
    type: select
    proxies: [AUTO, FALLBACK, YUHE-CF-172-2053, YUHE-CF-172-8443, YUHE-CF-172-2087, YUHE-CF-104-18-15-2053, DIRECT]
  - name: AUTO
    type: url-test
    proxies: [YUHE-CF-172-2053, YUHE-CF-172-8443, YUHE-CF-172-2087, YUHE-CF-104-18-15-2053]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true
  - name: FALLBACK
    type: fallback
    proxies: [YUHE-CF-172-2053, YUHE-CF-172-8443, YUHE-CF-172-2087, YUHE-CF-104-18-15-2053]
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
