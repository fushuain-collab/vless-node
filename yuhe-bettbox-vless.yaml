proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - FALLBACK
      - YUHE-CF-172-2053
      - YUHE-CF-172-8443
      - YUHE-CF-172-2087
      - YUHE-CF-104-18-15-2053
      - YUHE-CF-104-18-14-2053
      - YUHE-CF-104-18-15-443
      - YUHE-CF-104-18-14-443
      - DIRECT

  - name: AUTO
    type: url-test
    proxies:
      - YUHE-CF-172-2053
      - YUHE-CF-172-8443
      - YUHE-CF-172-2087
      - YUHE-CF-104-18-15-2053
      - YUHE-CF-104-18-14-2053
      - YUHE-CF-104-18-15-443
      - YUHE-CF-104-18-14-443
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true

  - name: FALLBACK
    type: fallback
    proxies:
      - YUHE-CF-172-2053
      - YUHE-CF-172-8443
      - YUHE-CF-172-2087
      - YUHE-CF-104-18-15-2053
      - YUHE-CF-104-18-14-2053
      - YUHE-CF-104-18-15-443
      - YUHE-CF-104-18-14-443
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true

